<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png?v=2" />
    <link rel="apple-touch-icon" href="/favicon.png?v=2" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>RetainHQ — Remember what you learn with spaced repetition</title>
    <meta
      name="description"
      content="RetainHQ measures what you still remember, not just what you completed. Built on spaced repetition and active recall, it schedules each review right before you'd forget — so knowledge sticks."
    />
    <meta name="keywords" content="spaced repetition, active recall, learning retention, study tool, SM-2, flashcards, knowledge retention, DSA roadmap, learning tracker" />
    <meta name="author" content="RetainHQ" />
    <meta name="robots" content="index, follow, max-image-preview:large" />
    <meta name="theme-color" content="#0b0f1a" />
    <link rel="canonical" href="https://retainhq.app/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="RetainHQ" />
    <meta property="og:url" content="https://retainhq.app/" />
    <meta property="og:title" content="RetainHQ — Remember what you learn" />
    <meta
      property="og:description"
      content="Track what you remember, not what you complete. Spaced repetition + active recall that schedules each review right before you'd forget."
    />
    <meta property="og:image" content="https://retainhq.app/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="RetainHQ — Remember what you learn" />
    <meta
      name="twitter:description"
      content="Track what you remember, not what you complete. Spaced repetition + active recall that schedules each review right before you'd forget."
    />
    <meta name="twitter:image" content="https://retainhq.app/og-image.png" />

    <!-- Structured data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "RetainHQ",
        "applicationCategory": "EducationalApplication",
        "operatingSystem": "Web",
        "url": "https://retainhq.app/",
        "description": "RetainHQ measures what you still remember, not just what you completed. Built on spaced repetition and active recall, it schedules each review right before you'd forget — so knowledge sticks.",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        }
      }
    </script>
    <script>
      // Apply theme before first paint to avoid a flash of the wrong theme.
      (function () {
        try {
          var t = localStorage.getItem('retainhq-theme');
          if (t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root">
      <!-- Static crawlable fallback: shown to non-JS crawlers and before the
           React bundle mounts; React replaces #root contents on render, so users
           never see it. Keeps real keyword-rich content in the served HTML. -->
      <noscript>
        <h1>RetainHQ — Remember what you learn</h1>
        <p>
          RetainHQ measures what you still remember, not just what you completed.
          Built on spaced repetition and active recall, it schedules each review
          right before you'd forget — so knowledge sticks. Log what you learn,
          capture the one key memory that matters, and let RetainHQ time your
          reviews with an SM-2 schedule across roadmaps for DSA, system design,
          web development, and more.
        </p>
      </noscript>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
