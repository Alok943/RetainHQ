
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); }
.roadmap { padding: 1.5rem 0; }
.phase-header { display: flex; align-items: center; gap: 10px; margin-bottom: 1rem; }
.phase-label { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.08em; color: var(--color-text-tertiary); }
.phase-bar { flex: 1; height: 0.5px; background: var(--color-border-tertiary); }
.phase-progress { font-size: 11px; color: var(--color-text-tertiary); }
.track { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 2rem; }
.track.single { grid-template-columns: 1fr; }
.node { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); padding: 10px 12px; cursor: pointer; transition: border-color 0.15s; display: flex; align-items: flex-start; gap: 10px; }
.node:hover { border-color: var(--color-border-secondary); }
.node.done { background: var(--color-background-success); border-color: var(--color-border-success); }
.node.done .node-title { color: var(--color-text-success); }
.node.active { border-color: var(--color-border-info); }
.check { width: 18px; height: 18px; border-radius: 50%; border: 1.5px solid var(--color-border-secondary); flex-shrink: 0; margin-top: 1px; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
.node.done .check { background: var(--color-background-success); border-color: var(--color-border-success); }
.node-body { flex: 1; min-width: 0; }
.node-title { font-size: 13px; font-weight: 500; color: var(--color-text-primary); line-height: 1.3; }
.node-sub { font-size: 11px; color: var(--color-text-tertiary); margin-top: 2px; line-height: 1.4; }
.node.done .node-sub { color: var(--color-text-success); opacity: 0.7; }
.tier-badge { font-size: 10px; padding: 1px 6px; border-radius: 999px; font-weight: 500; flex-shrink: 0; margin-top: 2px; }
.t1 { background: var(--color-background-secondary); color: var(--color-text-tertiary); }
.t2 { background: var(--color-background-info); color: var(--color-text-info); }
.t3 { background: var(--color-background-warning); color: var(--color-text-warning); }
.tdsa { background: var(--color-background-danger); color: var(--color-text-danger); }
.summary-bar { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 12px 16px; display: flex; align-items: center; gap: 16px; margin-bottom: 2rem; }
.summary-stat { text-align: center; }
.summary-stat .val { font-size: 20px; font-weight: 500; color: var(--color-text-primary); }
.summary-stat .lbl { font-size: 11px; color: var(--color-text-tertiary); margin-top: 1px; }
.summary-divider { width: 0.5px; height: 32px; background: var(--color-border-tertiary); }
.progress-track { flex: 1; }
.progress-bg { height: 4px; background: var(--color-background-tertiary); border-radius: 999px; overflow: hidden; }
.progress-fill { height: 100%; background: var(--color-text-success); border-radius: 999px; transition: width 0.3s; }
.progress-lbl { font-size: 11px; color: var(--color-text-tertiary); margin-top: 4px; }
</style>

<h2 class="sr-only">Python developer 2-month roadmap with progress tracking</h2>

<div class="roadmap" id="roadmap"></div>

<script>
const PHASES = [
  {
    label: "Month 1 — Python internals",
    tracks: [
      {
        col: "Python concepts",
        nodes: [
          { id:"oop1", title:"OOP basics", sub:"classes, __init__, self, instance vs class vars", tier:"t1" },
          { id:"oop2", title:"Dunders & operator overloading", sub:"__repr__, __str__, __add__, __mul__, __call__", tier:"t2" },
          { id:"dec1", title:"First-class functions & closures", sub:"functions as objects, returning functions, captured scope", tier:"t2" },
          { id:"dec2", title:"Decorators", sub:"@syntax, wraps, stacking decorators, parameterised decorators", tier:"t3" },
          { id:"gen1", title:"*args & **kwargs", sub:"packing/unpacking, calling conventions", tier:"t1" },
          { id:"gen2", title:"Generators & iterators", sub:"yield, __iter__, __next__, lazy evaluation", tier:"t3" },
          { id:"ctx1", title:"Context managers", sub:"with statement, __enter__/__exit__, contextlib", tier:"t2" },
          { id:"typ1", title:"Type hints & Pydantic", sub:"annotations, BaseModel, validation at runtime", tier:"t2" },
        ]
      },
      {
        col: "DSA",
        nodes: [
          { id:"d1", title:"Arrays & two pointers", sub:"sliding window, in-place ops, O(n) patterns", tier:"tdsa" },
          { id:"d2", title:"Hashmaps & sets", sub:"frequency count, two sum, grouping", tier:"tdsa" },
          { id:"d3", title:"Stacks & queues", sub:"valid parens, monotonic stack, deque", tier:"tdsa" },
          { id:"d4", title:"Sliding window", sub:"fixed & variable window, substring problems", tier:"tdsa" },
          { id:"d5", title:"Binary search", sub:"on sorted arrays, on answer space", tier:"tdsa" },
          { id:"d6", title:"Recursion basics", sub:"base case, call stack, memoisation intro", tier:"tdsa" },
        ]
      }
    ]
  },
  {
    label: "Month 2 — Production Python + harder DSA",
    tracks: [
      {
        col: "Python production",
        nodes: [
          { id:"err1", title:"Error handling", sub:"specific exceptions, HTTPException, never bare except", tier:"t2" },
          { id:"env1", title:"Env management", sub:".env, python-dotenv, os.getenv, pydantic-settings", tier:"t2" },
          { id:"mod1", title:"Project structure", sub:"modules, imports, __init__.py, no monolithic scripts", tier:"t2" },
          { id:"fapi1", title:"FastAPI — routes & Pydantic", sub:"GET/POST, request/response models, path & query params", tier:"t3" },
          { id:"fapi2", title:"Dependency injection", sub:"Depends(), shared DB/model clients, testability", tier:"t3" },
          { id:"async1", title:"Async / await", sub:"event loop, async def, await, when NOT to use it", tier:"t3" },
        ]
      },
      {
        col: "DSA",
        nodes: [
          { id:"d7", title:"Linked lists", sub:"reverse, detect cycle, merge sorted", tier:"tdsa" },
          { id:"d8", title:"Trees — BFS & DFS", sub:"level order, path sum, lowest common ancestor", tier:"tdsa" },
          { id:"d9", title:"Dynamic programming", sub:"1D DP: climbing stairs, house robber, coin change", tier:"tdsa" },
          { id:"d10", title:"Heaps & priority queues", sub:"heapq, top-K elements, merge K lists", tier:"tdsa" },
          { id:"d11", title:"Graphs basics", sub:"adjacency list, BFS/DFS on graph, cycle detection", tier:"tdsa" },
        ]
      }
    ]
  }
];

const STORAGE_KEY = "python_roadmap_v1";

function load() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch { return {}; }
}
function save(state) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch {}
}

let state = load();

function allNodes() {
  return PHASES.flatMap(p => p.tracks.flatMap(t => t.nodes));
}

function render() {
  const total = allNodes().length;
  const done = allNodes().filter(n => state[n.id]).length;
  const pct = total ? Math.round(done / total * 100) : 0;

  let html = `<div class="summary-bar">
    <div class="summary-stat"><div class="val">${done}</div><div class="lbl">completed</div></div>
    <div class="summary-divider"></div>
    <div class="summary-stat"><div class="val">${total - done}</div><div class="lbl">remaining</div></div>
    <div class="summary-divider"></div>
    <div class="progress-track">
      <div class="progress-bg"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div class="progress-lbl">${pct}% complete</div>
    </div>
  </div>`;

  for (const phase of PHASES) {
    const phaseNodes = phase.tracks.flatMap(t => t.nodes);
    const pDone = phaseNodes.filter(n => state[n.id]).length;
    html += `<div class="phase-header">
      <span class="phase-label">${phase.label}</span>
      <span class="phase-progress">${pDone}/${phaseNodes.length}</span>
      <div class="phase-bar"></div>
    </div>`;

    const maxLen = Math.max(...phase.tracks.map(t => t.nodes.length));
    html += `<div class="track">`;

    for (const track of phase.tracks) {
      html += `<div>`;
      html += `<div style="font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.07em;color:var(--color-text-tertiary);margin-bottom:8px;">${track.col}</div>`;
      for (const node of track.nodes) {
        const isDone = !!state[node.id];
        html += `<div class="node${isDone?' done':''}" onclick="toggle('${node.id}')" style="margin-bottom:8px;">
          <div class="check">${isDone ? '<i class="ti ti-check" style="font-size:11px;color:var(--color-text-success);" aria-hidden="true"></i>' : ''}</div>
          <div class="node-body">
            <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;">
              <span class="node-title">${node.title}</span>
              <span class="tier-badge ${node.tier}">${node.tier==='tdsa'?'DSA':node.tier==='t1'?'T1':node.tier==='t2'?'T2':'T3'}</span>
            </div>
            <div class="node-sub">${node.sub}</div>
          </div>
        </div>`;
      }
      html += `</div>`;
    }
    html += `</div>`;
  }

  document.getElementById('roadmap').innerHTML = html;
}

window.toggle = function(id) {
  state[id] = !state[id];
  save(state);
  render();
};

render();
</script>
